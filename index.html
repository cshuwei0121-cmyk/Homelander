<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>祖国人灵堂 · Homelander Memorial</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:#000;font-family:"Noto Serif SC","Songti SC","STSong",serif;color:#e8d4a0}
body{background:radial-gradient(ellipse at top,#1a0f0f 0%,#0a0505 50%,#000 100%);padding:32px 16px 60px;position:relative;min-height:100vh}
.red-halo{position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(180,30,40,.25) 0%,transparent 70%);pointer-events:none;filter:blur(30px);z-index:0}
.container{position:relative;max-width:1200px;margin:0 auto;z-index:2}
.header{text-align:center;margin-bottom:32px}
.h-en{font-size:12px;letter-spacing:.4em;color:#8a6f4a;margin-bottom:8px;text-transform:uppercase}
.h-zh{font-size:14px;letter-spacing:.3em;color:#a8865a;margin-bottom:14px}
h1{font-size:clamp(36px,5vw,56px);font-weight:400;letter-spacing:.15em;color:#f5e6c0;text-shadow:0 0 30px rgba(180,30,40,.5);font-style:italic}
.name-en{font-size:clamp(13px,1.4vw,16px);color:#a8865a;margin-top:8px;font-style:italic;letter-spacing:.1em}
.dates{font-size:clamp(11px,1.1vw,13px);color:#6b5538;margin-top:14px;letter-spacing:.2em}
.divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,#8a6f4a,transparent);margin:18px auto}

/* 主体两栏布局 */
.main{display:grid;grid-template-columns:1fr;gap:32px;align-items:start;max-width:560px;margin:0 auto}
@media(min-width:900px){
  .main{grid-template-columns:1fr 1fr;max-width:1100px;gap:60px;align-items:center}
  .portrait-wrap{position:sticky;top:32px}
}

.portrait-frame{position:relative;width:100%;max-width:520px;margin:0 auto;background:#000;box-shadow:0 25px 60px rgba(0,0,0,.95),0 0 100px rgba(180,30,40,.2)}
.portrait-frame img{width:100%;height:auto;display:block}

.interact{display:flex;flex-direction:column;align-items:center;gap:20px}
.candles{display:flex;justify-content:center;align-items:flex-end;gap:6px;min-height:70px;flex-wrap:wrap;max-width:100%}
.candle{display:flex;flex-direction:column;align-items:center}
.flame{width:8px;height:14px;background:radial-gradient(ellipse at center bottom,#fff5a0 0%,#ffb030 40%,#d4501a 80%,transparent 100%);border-radius:50% 50% 30% 30%/60% 60% 40% 40%;box-shadow:0 0 12px rgba(255,176,48,.8);margin-bottom:-2px;animation:fl 1.6s ease-in-out infinite}
.wick{width:1px;height:3px;background:#2a1a0a}
.wax{width:5px;height:34px;background:linear-gradient(180deg,#d4c4a0 0%,#b8a880 50%,#8a7a55 100%);border-radius:2px}

.altar{background:linear-gradient(180deg,#2a1810 0%,#1a0f08 100%);border:1px solid #4a3525;border-radius:4px;padding:16px 24px;width:100%;max-width:400px;display:flex;justify-content:space-around;font-size:28px;box-shadow:inset 0 1px 0 rgba(232,212,160,.1),0 8px 20px rgba(0,0,0,.6)}

.counter{text-align:center;padding:18px 24px;background:rgba(20,10,5,.6);border:1px solid rgba(232,212,160,.15);width:100%;max-width:400px;border-radius:2px}
.cl{font-size:11px;letter-spacing:.3em;color:#8a6f4a}
.cn{font-size:clamp(36px,4vw,48px);font-weight:300;color:#f5e6c0;font-style:italic;text-shadow:0 0 20px rgba(180,30,40,.4);margin:6px 0;font-variant-numeric:tabular-nums}

.btn{position:relative;width:200px;height:200px;cursor:pointer;user-select:none;transition:transform .15s}
.btn.sk{transform:scale(.95)}
.halo{position:absolute;inset:-30px;background:radial-gradient(circle,rgba(180,30,40,.25) 0%,transparent 60%);animation:ps 3s ease-in-out infinite;pointer-events:none}

.hint{text-align:center;font-size:13px;color:#8a6f4a;letter-spacing:.3em}
.cb{background:transparent;border:1px solid #5a4530;color:#a8865a;padding:12px 28px;font-size:13px;letter-spacing:.3em;font-family:inherit;cursor:pointer;border-radius:2px;transition:all .3s}
.cb:hover{background:rgba(180,30,40,.15);color:#f5e6c0;border-color:#8a6f4a}

.cps{margin-top:60px;display:flex;justify-content:center;gap:80px;font-size:clamp(13px,1.3vw,15px);color:#8a6f4a;font-style:italic;letter-spacing:.2em}
.cp{writing-mode:vertical-rl;line-height:2}
.ft{text-align:center;margin-top:48px;font-size:11px;color:#5a4530;letter-spacing:.25em;line-height:2}

.flr{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:10}
.flt{position:absolute;color:#f5e6c0;font-size:20px;font-weight:500;text-shadow:0 0 10px rgba(180,30,40,.7),0 2px 4px rgba(0,0,0,.9);white-space:nowrap;animation:fu 2s ease-out forwards}

@keyframes ps{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
@keyframes fu{0%{opacity:0;transform:translateY(0) scale(.8)}15%{opacity:1;transform:translateY(-15px) scale(1.15)}100%{opacity:0;transform:translateY(-150px) translateX(var(--d)) scale(1)}}
@keyframes fl{0%,100%{transform:scaleY(1);opacity:1}50%{transform:scaleY(.95) scaleX(1.05);opacity:.9}}

@media(max-width:600px){
  body{padding:24px 12px 40px}
  .btn{width:170px;height:170px}
  .cps{gap:40px;margin-top:40px}
  .altar{font-size:24px;padding:14px 20px}
}
</style></head>
<body>
<div class="red-halo"></div>
<div class="container">

<div class="header">
<div class="h-en">In Loving Memory</div>
<div class="h-zh">沉 痛 悼 念</div>
<h1>祖&nbsp;国&nbsp;人</h1>
<div class="name-en">Homelander · John Gillman</div>
<div class="dates">2019.07.26 — 2026.05.20</div>
<div class="divider"></div>
</div>

<div class="main">

<div class="portrait-wrap">
<div class="portrait-frame">
<img src="homelander.jpg" alt="Homelander Memorial">
</div>
</div>

<div class="interact">
<div class="candles" id="cd"></div>
<div class="altar"><span>🥛</span><span>🍎</span><span>🇺🇸</span><span>🐬</span><span>🌱</span></div>
<div class="counter"><div class="cl">已 吊 唁</div><div class="cn" id="ct">0</div><div class="cl">次</div></div>
<div class="btn" id="b">
<div class="halo"></div>
<svg viewBox="0 0 200 200" style="width:100%;height:100%">
<defs>
<radialGradient id="lg"><stop offset="0%" stop-color="#d4a040"/><stop offset="60%" stop-color="#8a6020"/><stop offset="100%" stop-color="#3a2810"/></radialGradient>
<radialGradient id="cg"><stop offset="0%" stop-color="#c41e2a"/><stop offset="100%" stop-color="#6b0a14"/></radialGradient>
</defs>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(45 100 100)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(90 100 100)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(135 100 100)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(180 100 100)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(225 100 100)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(270 100 100)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(315 100 100)" opacity=".85"/>
<circle cx="100" cy="100" r="42" fill="url(#cg)" stroke="#3a0a10" stroke-width="2"/>
<text x="100" y="115" text-anchor="middle" font-size="36" fill="#f5e6c0" font-family="serif" font-weight="bold">奠</text>
</svg>
</div>
<div class="hint">点 击 上 香 · 寄 托 哀 思</div>
<button class="cb" id="cbb">+ 点 一 支 蜡 烛</button>
</div>

</div>

<div class="cps">
<div class="cp">一 朝 跌 落 神 坛</div>
<div class="cp">半 世 假 笑 终 散</div>
</div>
<div class="ft">THE BOYS · FINAL SEASON<br>2026 · 愿 世 界 再 无 超 英</div>

</div>

<div class="flr" id="fl"></div>

<script>
const E=['功德 +1','美利坚痛失忠良','七人组只剩六人','一路走好,祖国人','激光眼已熄灭','红蓝披风已落地','Homelander, R.I.P.','牛奶续不动了','深海正在赶来','休斯队长终于解脱','阿什利可以下班了','芽芽痛失偶像','沃特国际股价归零','化合物V停产','The Boys 大获全胜','假笑面具碎了','You are the real heroes','America\'s Hero, R.I.P.'];
let c=0,k=7,a=null;
try{c=+localStorage.getItem('hc')||0;k=+localStorage.getItem('hk')||7}catch(e){}
const ct=document.getElementById('ct'),b=document.getElementById('b'),cd=document.getElementById('cd'),cb=document.getElementById('cbb'),fl=document.getElementById('fl');
ct.textContent=c;
function rc(){cd.innerHTML='';for(let i=0;i<k;i++){const x=document.createElement('div');x.className='candle';const d=i*.3;x.innerHTML='<div class="flame" style="animation-duration:'+(1.5+d*.3)+'s;animation-delay:'+d+'s"></div><div class="wick"></div><div class="wax"></div>';cd.appendChild(x)}}
rc();
function pb(){try{if(!a)a=new(window.AudioContext||window.webkitAudioContext)();const n=a.currentTime;const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.setValueAtTime(180,n);o.frequency.exponentialRampToValueAtTime(60,n+.4);g.gain.setValueAtTime(.4,n);g.gain.exponentialRampToValueAtTime(.001,n+.6);o.connect(g).connect(a.destination);o.start(n);o.stop(n+.6);const o2=a.createOscillator(),g2=a.createGain();o2.type='triangle';o2.frequency.setValueAtTime(420,n);o2.frequency.exponentialRampToValueAtTime(200,n+.3);g2.gain.setValueAtTime(.15,n);g2.gain.exponentialRampToValueAtTime(.001,n+.4);o2.connect(g2).connect(a.destination);o2.start(n);o2.stop(n+.4)}catch(e){}}
b.addEventListener('click',function(e){c++;ct.textContent=c;try{localStorage.setItem('hc',c)}catch(e){}pb();b.classList.add('sk');setTimeout(()=>b.classList.remove('sk'),200);const eu=E[Math.floor(Math.random()*E.length)];const x=e.clientX||(e.touches&&e.touches[0]&&e.touches[0].clientX)||window.innerWidth/2;const y=e.clientY||(e.touches&&e.touches[0]&&e.touches[0].clientY)||window.innerHeight/2;const d=(Math.random()-.5)*100;const el=document.createElement('div');el.className='flt';el.style.left=x+'px';el.style.top=y+'px';el.style.setProperty('--d',d+'px');el.textContent=eu;fl.appendChild(el);setTimeout(()=>el.remove(),2000)});
cb.addEventListener('click',()=>{k++;try{localStorage.setItem('hk',k)}catch(e){}rc()});
</script>
</body></html>
