<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>祖国人灵堂 · Homelander Memorial</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:#000;font-family:"Noto Serif SC","Songti SC","STSong",serif;color:#e8d4a0}
body{background:radial-gradient(ellipse at top,#1a0f0f 0%,#0a0505 50%,#000 100%);padding:32px 16px 60px;position:relative;min-height:100vh}
.red-halo{position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(180,30,40,.25) 0%,transparent 70%);pointer-events:none;filter:blur(30px);z-index:0}
.container{position:relative;max-width:1200px;margin:0 auto;z-index:2}
.header{text-align:center;margin-bottom:32px}
.h-en{font-size:12px;letter-spacing:.4em;color:#8a6f4a;margin-bottom:8px;text-transform:uppercase}
.h-zh{font-size:14px;letter-spacing:.3em;color:#a8865a;margin-bottom:14px}
h1{font-size:clamp(36px,5vw,56px);font-weight:400;letter-spacing:.15em;color:#f5e6c0;text-shadow:0 0 30px rgba(180,30,40,.5);font-style:italic}
.name-en{font-size:clamp(13px,1.4vw,16px);color:#a8865a;margin-top:8px;font-style:italic;letter-spacing:.1em}
.dates{font-size:clamp(11px,1.1vw,13px);color:#6b5538;margin-top:14px;letter-spacing:.2em}
.divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,#8a6f4a,transparent);margin:18px auto}

/* 音乐控制按钮 */
.music-ctrl{position:fixed;top:20px;right:20px;z-index:100;background:rgba(20,10,5,.8);border:1px solid #5a4530;color:#a8865a;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .3s;backdrop-filter:blur(10px)}
.music-ctrl:hover{background:rgba(180,30,40,.2);color:#f5e6c0}

.main{display:grid;grid-template-columns:1fr;gap:32px;align-items:start;max-width:560px;margin:0 auto}
@media(min-width:768px){
  .main{grid-template-columns:1fr 1fr;max-width:1100px;gap:60px;align-items:center}
  .portrait-wrap{position:sticky;top:32px}
}

.portrait-frame{position:relative;width:100%;max-width:520px;margin:0 auto;background:#000;box-shadow:0 25px 60px rgba(0,0,0,.95),0 0 100px rgba(180,30,40,.2)}
.portrait-frame img{width:100%;height:auto;display:block}

.interact{display:flex;flex-direction:column;align-items:center;gap:20px}

/* 火光光柱 */
.firepit{position:relative;width:100%;max-width:400px;height:120px;margin:0 auto;display:flex;align-items:flex-end;justify-content:center}
.fire-base{position:absolute;bottom:0;width:100%;height:8px;background:linear-gradient(180deg,#3a1810 0%,#1a0808 100%);border-radius:50%/100% 100% 0 0;box-shadow:0 -4px 20px rgba(80,30,10,.5)}
.fire-glow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80%;height:100%;background:radial-gradient(ellipse at bottom,rgba(255,140,40,var(--intensity,0)) 0%,rgba(220,80,20,calc(var(--intensity,0)*.6)) 40%,transparent 70%);transition:all .8s ease-out;pointer-events:none;filter:blur(8px)}
.fire-flame{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);display:flex;align-items:flex-end;gap:2px}
.fp-flame{width:6px;background:linear-gradient(180deg,transparent 0%,#ffb030 30%,#d4501a 70%,#6b1a05 100%);border-radius:50% 50% 30% 30%/80% 80% 20% 20%;box-shadow:0 0 8px rgba(255,140,40,.6);opacity:0;transform-origin:bottom;animation:firegrow 3s ease-out forwards,flicker 1.2s ease-in-out infinite}

.altar{background:linear-gradient(180deg,#2a1810 0%,#1a0f08 100%);border:1px solid #4a3525;border-radius:4px;padding:16px 24px;width:100%;max-width:400px;display:flex;justify-content:space-around;font-size:28px;box-shadow:inset 0 1px 0 rgba(232,212,160,.1),0 8px 20px rgba(0,0,0,.6)}

.counter{text-align:center;padding:18px 24px;background:rgba(20,10,5,.6);border:1px solid rgba(232,212,160,.15);width:100%;max-width:400px;border-radius:2px}
.cl{font-size:11px;letter-spacing:.3em;color:#8a6f4a}
.cn{font-size:clamp(36px,4vw,48px);font-weight:300;color:#f5e6c0;font-style:italic;text-shadow:0 0 20px rgba(180,30,40,.4);margin:6px 0;font-variant-numeric:tabular-nums}

.btn{position:relative;width:200px;height:200px;cursor:pointer;user-select:none;transition:transform .15s}
.btn.sk{transform:scale(.92)}
.halo{position:absolute;inset:-30px;background:radial-gradient(circle,rgba(180,30,40,.25) 0%,transparent 60%);animation:ps 3s ease-in-out infinite;pointer-events:none}

.hint{text-align:center;font-size:13px;color:#8a6f4a;letter-spacing:.3em}

.cps{margin-top:60px;display:flex;justify-content:center;gap:80px;font-size:clamp(13px,1.3vw,15px);color:#8a6f4a;font-style:italic;letter-spacing:.2em}
.cp{writing-mode:vertical-rl;line-height:2}
.ft{text-align:center;margin-top:48px;font-size:11px;color:#5a4530;letter-spacing:.25em;line-height:2}

.flr{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:10}
.flt{position:absolute;color:#f5e6c0;font-size:20px;font-weight:500;text-shadow:0 0 10px rgba(180,30,40,.7),0 2px 4px rgba(0,0,0,.9);white-space:nowrap;animation:fu 2.4s ease-out forwards}

@keyframes ps{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
@keyframes fu{0%{opacity:0;transform:translateY(0) scale(.8)}15%{opacity:1;transform:translateY(-15px) scale(1.15)}100%{opacity:0;transform:translateY(-180px) translateX(var(--d)) scale(1)}}
@keyframes flicker{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(1.05) scaleX(.92)}}
@keyframes firegrow{0%{opacity:0;height:0}100%{opacity:1;height:var(--h)}}

@media(max-width:600px){
  body{padding:24px 12px 40px}
  .btn{width:170px;height:170px}
  .cps{gap:40px;margin-top:40px}
  .altar{font-size:24px;padding:14px 20px}
  .firepit{height:90px}
}
</style></head>
<body>
<div class="red-halo"></div>
<button class="music-ctrl" id="mc" title="哀乐">♪</button>

<div class="container">

<div class="header">
<div class="h-en">In Loving Memory</div>
<div class="h-zh">沉 痛 悼 念</div>
<h1>祖&nbsp;国&nbsp;人</h1>
<div class="name-en">Homelander · John Gillman</div>
<div class="dates">2019.07.26 — 2026.05.20</div>
<div class="divider"></div>
</div>

<div class="main">

<div class="portrait-wrap">
<div class="portrait-frame">
<img src="homelander.jpg" alt="Homelander Memorial">
</div>
</div>

<div class="interact">

<div class="firepit">
<div class="fire-glow" id="fg"></div>
<div class="fire-flame" id="ff"></div>
<div class="fire-base"></div>
</div>

<div class="altar"><span>🥛</span><span>🍎</span><span>🇺🇸</span><span>🐬</span><span>🌱</span></div>
<div class="counter"><div class="cl">已 吊 唁</div><div class="cn" id="ct">0</div><div class="cl">次</div></div>
<div class="btn" id="b">
<div class="halo"></div>
<svg viewBox="0 0 200 200" style="width:100%;height:100%">
<defs>
<radialGradient id="lg"><stop offset="0%" stop-color="#d4a040"/><stop offset="60%" stop-color="#8a6020"/><stop offset="100%" stop-color="#3a2810"/></radialGradient>
<radialGradient id="cg"><stop offset="0%" stop-color="#c41e2a"/><stop offset="100%" stop-color="#6b0a14"/></radialGradient>
</defs>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(45 100 100)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(90 100 100)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(135 100 100)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(180 100 100)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(225 100 100)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(270 100 100)" opacity=".85"/>
<ellipse cx="100" cy="40" rx="14" ry="42" fill="url(#lg)" transform="rotate(315 100 100)" opacity=".85"/>
<circle cx="100" cy="100" r="42" fill="url(#cg)" stroke="#3a0a10" stroke-width="2"/>
<text x="100" y="115" text-anchor="middle" font-size="36" fill="#f5e6c0" font-family="serif" font-weight="bold">奠</text>
</svg>
</div>
<div class="hint">点 击 撞 钟 · 寄 托 哀 思</div>

</div>

</div>

<div class="cps">
<div class="cp">一 朝 跌 落 神 坛</div>
<div class="cp">半 世 假 笑 终 散</div>
</div>
<div class="ft">THE BOYS · FINAL SEASON<br>2026 · 愿 世 界 再 无 超 英</div>

</div>

<div class="flr" id="fl"></div>

<script>
const E=['功德 +1','美利坚痛失忠良','七人组只剩六人','一路走好,祖国人','激光眼已熄灭','红蓝披风已落地','Homelander, R.I.P.','牛奶续不动了','深海正在赶来','休斯队长终于解脱','阿什利可以下班了','芽芽痛失偶像','沃特国际股价归零','化合物V停产','The Boys 大获全胜','假笑面具碎了','You are the real heroes','America\'s Hero, R.I.P.','钟声响彻天堂','烛火长明不灭'];

let c=0,a=null,musicOn=false,musicNodes=null;
try{c=+localStorage.getItem('hc')||0}catch(e){}

const ct=document.getElementById('ct'),b=document.getElementById('b'),fl=document.getElementById('fl'),fg=document.getElementById('fg'),ff=document.getElementById('ff'),mc=document.getElementById('mc');
ct.textContent=c;

// 火光强度，根据吊唁次数渐强（0次=暗，100次=最亮）
function updateFire(){
  const intensity=Math.min(1,c/50);
  fg.style.setProperty('--intensity',intensity);
  // 火焰条数随次数增长
  const flameCount=Math.min(15,3+Math.floor(c/3));
  ff.innerHTML='';
  for(let i=0;i<flameCount;i++){
    const f=document.createElement('div');
    f.className='fp-flame';
    const h=40+Math.random()*40+Math.min(40,c*.3);
    f.style.setProperty('--h',h+'px');
    f.style.animationDelay=(i*.15)+'s, '+(i*.2)+'s';
    f.style.animationDuration='2.5s, '+(1+Math.random()*.8)+'s';
    ff.appendChild(f);
  }
}
updateFire();

function ensureCtx(){if(!a)a=new(window.AudioContext||window.webkitAudioContext)();if(a.state==='suspended')a.resume();return a}

// 真实铜钟声 - 多层叠加
function playBell(){
  try{
    const ctx=ensureCtx();const n=ctx.currentTime;
    // 主基频 - 低沉钟身
    const f1=[110,165,220,330,440];
    const g1=[.5,.3,.2,.15,.1];
    const d1=[3.5,2.8,2.2,1.5,1.0];
    f1.forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(0,n);
      g.gain.linearRampToValueAtTime(g1[i],n+.005);
      g.gain.exponentialRampToValueAtTime(.001,n+d1[i]);
      o.connect(g).connect(ctx.destination);
      o.start(n);o.stop(n+d1[i]);
    });
    // 撞击瞬间的金属噪声
    const buf=ctx.createBuffer(1,ctx.sampleRate*.15,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,3);
    const src=ctx.createBufferSource();src.buffer=buf;
    const filter=ctx.createBiquadFilter();filter.type='bandpass';filter.frequency.value=2000;filter.Q.value=2;
    const gN=ctx.createGain();gN.gain.value=.2;
    src.connect(filter).connect(gN).connect(ctx.destination);
    src.start(n);
  }catch(e){}
}

// 哀乐 - 持续低音风琴和弦
function startMusic(){
  try{
    const ctx=ensureCtx();
    const chord=[
      {f:65.4,g:.06},  // C2
      {f:77.8,g:.05},  // Eb2 (小三和弦)
      {f:98,g:.05},    // G2
      {f:130.8,g:.04}, // C3
      {f:196,g:.03}    // G3
    ];
    musicNodes={oscs:[],gains:[],master:null};
    const master=ctx.createGain();
    master.gain.setValueAtTime(0,ctx.currentTime);
    master.gain.linearRampToValueAtTime(1,ctx.currentTime+2);
    master.connect(ctx.destination);
    musicNodes.master=master;
    chord.forEach(c=>{
      const o=ctx.createOscillator(),g=ctx.createGain(),lfo=ctx.createOscillator(),lfoG=ctx.createGain();
      o.type='sine';o.frequency.value=c.f;
      // 加入微弱颤音
      lfo.frequency.value=.3+Math.random()*.4;
      lfoG.gain.value=.5;
      lfo.connect(lfoG).connect(o.frequency);
      g.gain.value=c.g;
      o.connect(g).connect(master);
      o.start();lfo.start();
      musicNodes.oscs.push(o);musicNodes.oscs.push(lfo);
      musicNodes.gains.push(g);
    });
    musicOn=true;mc.textContent='♫';mc.title='静音';
  }catch(e){}
}

function stopMusic(){
  if(!musicNodes)return;
  try{
    const ctx=a;
    musicNodes.master.gain.linearRampToValueAtTime(0,ctx.currentTime+1);
    setTimeout(()=>{musicNodes.oscs.forEach(o=>{try{o.stop()}catch(e){}});musicNodes=null},1100);
  }catch(e){}
  musicOn=false;mc.textContent='♪';mc.title='哀乐';
}

mc.addEventListener('click',()=>{if(musicOn)stopMusic();else startMusic()});

b.addEventListener('click',function(e){
  c++;ct.textContent=c;try{localStorage.setItem('hc',c)}catch(e){}
  playBell();
  updateFire();
  b.classList.add('sk');setTimeout(()=>b.classList.remove('sk'),200);
  const eu=E[Math.floor(Math.random()*E.length)];
  const x=e.clientX||(e.touches&&e.touches[0]&&e.touches[0].clientX)||window.innerWidth/2;
  const y=e.clientY||(e.touches&&e.touches[0]&&e.touches[0].clientY)||window.innerHeight/2;
  const d=(Math.random()-.5)*120;
  const el=document.createElement('div');el.className='flt';
  el.style.left=x+'px';el.style.top=y+'px';
  el.style.setProperty('--d',d+'px');
  el.textContent=eu;
  fl.appendChild(el);
  setTimeout(()=>el.remove(),2400);
});
</script>
</body></html>
